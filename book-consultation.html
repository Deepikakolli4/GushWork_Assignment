<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Consultation</title>
  <style>
    :root {
      --primary: #2b3990;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --bg: #f6f8ff;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #edf1ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--white);
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      box-shadow: 0 16px 30px rgba(17, 24, 39, 0.08);
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 14px;
      font-weight: 600;
    }

    input,
    select,
    textarea {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 15px;
      font-family: inherit;
    }

    textarea { min-height: 96px; resize: vertical; }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 11px 16px;
      font-size: 15px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: #e5e7eb; color: #111827; }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Book a Consultation</h1>
    <p>Choose your date and share your requirement. We will confirm your booking.</p>

    <form>
      <div class="grid">
        <div class="field">
          <label for="name">Full Name</label>
          <input id="name" name="name" type="text" placeholder="Your full name" required>
        </div>
        <div class="field">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" placeholder="name@example.com" required>
        </div>
        <div class="field">
          <label for="date">Preferred Date</label>
          <input id="date" name="date" type="date" required>
        </div>
        <div class="field">
          <label for="slot">Preferred Slot</label>
          <select id="slot" name="slot" required>
            <option value="">Select slot</option>
            <option>10:00 AM - 11:00 AM</option>
            <option>12:00 PM - 1:00 PM</option>
            <option>3:00 PM - 4:00 PM</option>
          </select>
        </div>
        <div class="field full">
          <label for="requirement">Requirement</label>
          <textarea id="requirement" name="requirement" placeholder="Describe your use case"></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" type="submit">Book Now</button>
        <a class="btn btn-secondary" href="index.html">Back to Home</a>
      </div>
    </form>
  </main>
</body>
</html>
